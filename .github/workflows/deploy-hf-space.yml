# Deploy only what the root Dockerfile needs for the Hugging Face Docker Space.
# This avoids pushing the full GitHub tree (PDFs, notebooks, training artifacts, etc.),
# which Hugging Face rejects via pre-receive hooks for binary git objects.
#
# When you change Dockerfile COPY lines, update the file lists below to match.

name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hf-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
      # Optional; when empty the sync step defaults to `main` (shell ${VAR:-main}).
      HF_SPACE_BRANCH: ${{ vars.HF_SPACE_BRANCH }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "Missing required secret: HF_TOKEN"
            exit 1
          fi
          if [ -z "${HF_SPACE_REPO}" ]; then
            echo "Missing required repo variable: HF_SPACE_REPO (example: teletubbies/autonomous-sre)"
            exit 1
          fi

      - name: Build Space payload (Dockerfile whitelist)
        run: |
          set -euo pipefail
          SRC="${GITHUB_WORKSPACE}"
          DST="/tmp/hf-space-src"
          rm -rf "${DST}"
          mkdir -p "${DST}"

          # ---- Must match root Dockerfile (COPY + build context) ----
          install -m0644 "${SRC}/requirements.txt" "${DST}/requirements.txt"
          install -m0644 "${SRC}/Dockerfile" "${DST}/Dockerfile"
          if [ -f "${SRC}/.dockerignore" ]; then
            install -m0644 "${SRC}/.dockerignore" "${DST}/.dockerignore"
          fi

          for f in \
            app.py session_runtime.py baseline.py client.py data.py environment.py gym_wrapper.py \
            inference.py models.py rubrics.py tasks.py test_api.py test_env.py \
            ui.py validate.py openenv.yaml pyproject.toml \
            BLOG_POST.md CodeOrganismVM_Training.ipynb; do
            install -m0644 "${SRC}/${f}" "${DST}/${f}"
          done

          mkdir -p "${DST}/training"
          install -m0644 "${SRC}/training/rollout.py" "${DST}/training/rollout.py"

          cp -a "${SRC}/sre_platform" "${DST}/sre_platform"
          mkdir -p "${DST}/static/console"
          cp -a "${SRC}/static/console/." "${DST}/static/console/"

          cp -a "${SRC}/evaluation" "${DST}/evaluation"
          cp -a "${SRC}/project_skills" "${DST}/project_skills"

          install -m0644 "${SRC}/.github/hf-space/README.md" "${DST}/README.md"

          echo "Space payload tree (max depth 3):"
          find "${DST}" -maxdepth 3 -type f | sort

      - name: Sync files to Hugging Face Space
        run: |
          set -euo pipefail
          BRANCH="${HF_SPACE_BRANCH:-main}"
          echo "Using branch: ${BRANCH}"
          git clone "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" /tmp/hf-space-repo
          cd /tmp/hf-space-repo
          git fetch origin "${BRANCH}" 2>/dev/null || true
          git checkout "${BRANCH}" 2>/dev/null || git checkout -b "${BRANCH}"
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a /tmp/hf-space-src/. .
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync from GitHub: ${GITHUB_SHA}"
          git push -u origin "${BRANCH}"
