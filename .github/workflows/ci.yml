name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "feature/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Syntax check
        run: |
          python -m py_compile app.py server/app.py data.py environment.py gym_wrapper.py inference.py models.py tasks.py ui.py validate.py baseline.py client.py training/generate_sft_data.py training/grpo_train.py training/curriculum.py test_api.py test_env.py

      - name: Run tests
        run: |
          pytest -q

      - name: Dependency audit
        run: |
          pip-audit -r requirements.txt

      - name: Docker build
        run: |
          docker build .
