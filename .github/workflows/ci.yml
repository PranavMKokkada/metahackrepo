name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit ruff

      - name: Ruff lint
        run: ruff check .

      - name: Syntax check
        run: |
          python -m py_compile app.py session_runtime.py server/app.py data.py environment.py gym_wrapper.py inference.py models.py tasks.py ui.py validate.py baseline.py client.py training/generate_sft_data.py training/grpo_train.py training/curriculum.py test_api.py test_env.py sre_platform/__init__.py sre_platform/state.py sre_platform/services.py sre_platform/routes.py sre_platform/step_executor.py

      - name: Run tests
        run: |
          pytest -q

      - name: Backend and UI smoke check
        env:
          CODEORGANISM_API_KEYS: ci-key
          PORT: "7860"
        run: |
          set -euo pipefail
          python app.py > /tmp/app.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID || true; wait $APP_PID 2>/dev/null || true; echo "--- app log ---"; cat /tmp/app.log' EXIT
          python - <<'PY'
          import time, requests
          for _ in range(60):
              try:
                  r = requests.get("http://127.0.0.1:7860/health", timeout=2)
                  if r.status_code == 200:
                      break
              except Exception:
                  pass
              time.sleep(1)
          else:
              raise RuntimeError("app.py did not become healthy in time")
          ui = requests.get("http://127.0.0.1:7860/ui", timeout=5)
          if ui.status_code not in (200, 302, 307):
              raise RuntimeError(f"Unexpected /ui status: {ui.status_code}")
          print("health and ui smoke check passed")
          PY

      - name: Print audited requirement pins
        run: |
          grep -E '^(fastapi|requests|pytest|starlette)==' requirements.txt || true

      - name: Dependency audit
        run: |
          pip-audit -r requirements.txt

      - name: Docker build
        run: |
          docker build .
