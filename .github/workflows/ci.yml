name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "feature/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic requests pyyaml pytest gradio openai

      - name: Syntax check
        run: |
          python -m py_compile app.py server/app.py data.py environment.py gym_wrapper.py inference.py models.py tasks.py ui.py validate.py

      - name: Run unit tests
        run: |
          pytest -q test_env.py
