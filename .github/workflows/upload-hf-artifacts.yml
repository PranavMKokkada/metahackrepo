name: Upload Hugging Face Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hf-artifact-upload
  cancel-in-progress: true

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_MODEL_REPO: ${{ vars.HF_MODEL_REPO }}
      HF_DATASET_REPO: ${{ vars.HF_DATASET_REPO }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "Missing required secret: HF_TOKEN"
            exit 1
          fi
          if [ -z "${HF_MODEL_REPO}" ]; then
            echo "Missing required repo variable: HF_MODEL_REPO (example: teletubbies/autonomous-sre-lora)"
            exit 1
          fi
          if [ -z "${HF_DATASET_REPO}" ]; then
            echo "Missing required repo variable: HF_DATASET_REPO (example: teletubbies/autonomous-sre-logs)"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Upload artifacts to Hugging Face
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          model_repo = os.environ["HF_MODEL_REPO"]
          dataset_repo = os.environ["HF_DATASET_REPO"]
          api = HfApi(token=token)

          policies_dir = Path("training/policies")
          if policies_dir.exists():
              api.upload_folder(
                  repo_id=model_repo,
                  repo_type="model",
                  folder_path=str(policies_dir),
                  path_in_repo="training/policies",
                  commit_message=f"Upload policy artifacts from {os.environ['GITHUB_SHA']}",
              )

          lora_dir = Path("artifacts/runtime/lora_adapter")
          if lora_dir.exists():
              api.upload_folder(
                  repo_id=model_repo,
                  repo_type="model",
                  folder_path=str(lora_dir),
                  path_in_repo="lora_adapter",
                  commit_message=f"Upload LoRA adapter from {os.environ['GITHUB_SHA']}",
              )

          results_dir = Path("results")
          if results_dir.exists():
              api.upload_folder(
                  repo_id=dataset_repo,
                  repo_type="dataset",
                  folder_path=str(results_dir),
                  path_in_repo="results",
                  allow_patterns=["*.json", "*.jsonl", "*.png", "*.txt", "*.md"],
                  commit_message=f"Upload results artifacts from {os.environ['GITHUB_SHA']}",
              )

          report_file = Path("evaluation/report.md")
          if report_file.exists():
              api.upload_file(
                  repo_id=dataset_repo,
                  repo_type="dataset",
                  path_or_fileobj=str(report_file),
                  path_in_repo="evaluation/report.md",
                  commit_message=f"Upload evaluation report from {os.environ['GITHUB_SHA']}",
              )
          PY
